<!DOCTYPE html>
<html lang="en-GB">
<head>
  <link rel="icon" href="/sapling.ico" sizes="any">
  <link rel="icon" type="image/png" href="/sapling.png">
  <link rel="apple-touch-icon" href="/sapling.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sapling Partners — Coming soon</title>
  <meta name="description" content="Sapling partner applications are not yet public. More details coming soon." />
  <style>
    :root {
      --bg: #f8f5ef;
      --text: #1a2b1f;
      --muted: #5a6860;
      --line: #e0d6c6;
      --green: #3a7049;
      --sh-lg: 0 8px 18px rgba(26,43,31,.05), 0 24px 56px rgba(26,43,31,.10);
      --radius-xl: 40px;
      --max: 980px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 760px 520px at 90% 0%, rgba(104,160,120,.13) 0%, transparent 65%),
        radial-gradient(ellipse 600px 460px at 8% 92%, rgba(200,154,63,.08) 0%, transparent 65%),
        linear-gradient(180deg, #faf7f0 0%, #f8f5ef 55%, #f2ece0 100%);
      -webkit-font-smoothing: antialiased;
      line-height: 1.55;
    }
    .panel {
      width: min(var(--max), 100%);
      padding: 32px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(224,214,198,.9);
      background: rgba(255,255,255,.74);
      box-shadow: var(--sh-lg);
      backdrop-filter: blur(12px);
    }
    .brand { display: inline-flex; align-items: center; gap: 12px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.25rem; }
    .brand img { width: 42px; height: 42px; object-fit: contain; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 28px;
      background: rgba(104,160,120,.1); color: var(--green);
      border: 1px solid rgba(104,160,120,.2);
      padding: 7px 14px; border-radius: 999px;
      font-weight: 600; font-size: 12px; letter-spacing: .05em; text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 0;
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.4rem, 5.4vw, 4.8rem);
      line-height: .95;
      letter-spacing: -.05em;
      max-width: 12ch;
    }
    p { margin: 18px 0 0; color: var(--muted); max-width: 40rem; font-size: 1.02rem; }
  </style>
</head>
<body>
  <main class="panel">
    <div class="brand">
      <img src="/sapling.png" alt="Sapling logo">
      <span>Sapling</span>
    </div>
    <span class="eyebrow">Partners coming soon</span>
    <h1>The partner programme is being prepared quietly.</h1>
    <p>This page is intentionally not public yet. Sapling will open partner applications once the programme, materials, and qualification flow are ready to share properly.</p>
  </main>
</body>
</html>
